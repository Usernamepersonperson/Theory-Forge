<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Theory Forge</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root { --bg:#0e1116; --fg:#e6edf3; --mut:#8b949e; --acc:#7ee787;
          --warn:#f0b84a; --bad:#ff7b72; --card:#161b22; --br:#30363d;
          --blue:#79c0ff; --purple:#d2a8ff; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
         background:var(--bg); color:var(--fg); line-height:1.45; }
  header { padding: 32px 24px 8px; display:flex; align-items:baseline; gap:16px; flex-wrap:wrap; }
  h1 { margin:0; font-size: 22px; letter-spacing:.5px; }
  h1 span { color: var(--acc); }
  p.sub { color: var(--mut); margin: 4px 0 0; font-size: 13px; }
  .version { color:var(--mut); font-size:11px; }
  main { padding: 16px 24px 80px; max-width: 1060px; }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin: 16px 0; }
  input, button, select {
    background:var(--card); color:var(--fg); border:1px solid var(--br);
    padding: 8px 10px; border-radius:6px; font: inherit;
  }
  input { min-width: 180px; }
  button { cursor:pointer; }
  button:hover { border-color: var(--acc); color: var(--acc); }
  button:disabled { opacity:.5; cursor: progress; }
  label.toggle { color: var(--mut); font-size:12px; display:inline-flex; gap:6px; align-items:center; }
  .card { background: var(--card); border:1px solid var(--br); border-radius:8px;
          padding:14px 16px; margin: 12px 0; }
  .name { font-size: 16px; color: var(--acc); margin: 0 0 6px; }
  .meta { color: var(--mut); font-size: 12px; }
  pre { white-space: pre-wrap; word-break: break-word; margin:0; font-size: 13px; }
  .pair { display:flex; justify-content:space-between; gap:12px; font-size: 13px;
          padding:6px 0; border-bottom: 1px dashed var(--br); cursor:pointer; }
  .pair:hover { color: var(--acc); }
  .sim { color: var(--mut); }
  .err { color: var(--bad); }
  .prior { color: var(--warn); font-size: 12px; margin: 4px 0 8px; }
  datalist { display:none; }
  .tabs { display:flex; gap:0; margin: 24px 0 0; border-bottom: 1px solid var(--br); overflow-x:auto; }
  .tab { padding: 8px 14px; cursor:pointer; color: var(--mut); font-size: 13px;
         border-bottom: 2px solid transparent; white-space:nowrap; }
  .tab.active { color: var(--acc); border-bottom-color: var(--acc); }
  .tab:hover { color: var(--fg); }
  .tab-content { display:none; }
  .tab-content.active { display:block; }
  .conf { display:inline-block; min-width:36px; color:var(--acc); font-weight:bold; }
  .rank-item { padding:8px 0; border-bottom:1px solid var(--br); font-size:13px; cursor:pointer; }
  .rank-item:hover .name-link { color:var(--fg); text-decoration:underline; }
  .rank-item .claim { color:var(--mut); margin:4px 0 0; font-size:12px; }
  .name-link { color:var(--acc); }
  .batch-header { color:var(--acc); font-size:14px; margin:16px 0 4px; cursor:pointer; }
  .batch-header:hover { text-decoration:underline; }
  .batch-items { display:none; padding-left:16px; }
  .batch-items.open { display:block; }
  .batch-fw { font-size:12px; padding:2px 0; color:var(--mut); }
  .batch-fw .bname { color:var(--fg); }
  select.sm { min-width:auto; font-size:12px; padding:4px 8px; }
  input.sm { min-width:80px; font-size:12px; padding:4px 8px; }

  /* Stats */
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin:16px 0; }
  .stat-card { background:var(--card); border:1px solid var(--br); border-radius:8px;
               padding:16px; text-align:center; }
  .stat-val { font-size:28px; font-weight:bold; color:var(--acc); }
  .stat-label { font-size:11px; color:var(--mut); margin-top:4px; }
  .bar-chart { margin:16px 0; }
  .bar-row { display:flex; align-items:center; gap:8px; margin:3px 0; font-size:12px; }
  .bar-label { min-width:200px; color:var(--mut); text-align:right; overflow:hidden;
               text-overflow:ellipsis; white-space:nowrap; }
  .bar { height:16px; background:var(--acc); border-radius:3px; min-width:2px; }
  .bar-count { color:var(--mut); min-width:24px; }

  /* Deep dives */
  .dd-card { background:var(--card); border:1px solid var(--br); border-radius:8px;
             padding:16px; margin:12px 0; cursor:pointer; transition: border-color .15s; }
  .dd-card:hover { border-color:var(--acc); }
  .dd-title { font-size:15px; color:var(--acc); margin:0 0 6px; }
  .dd-meta { color:var(--mut); font-size:12px; }
  .dd-summary { color:var(--fg); font-size:13px; margin:8px 0 0; line-height:1.5; }
  .dd-detail { margin:16px 0; }
  .dd-section { margin:12px 0; }
  .dd-section h4 { color:var(--blue); font-size:13px; margin:0 0 6px; text-transform:uppercase;
                   letter-spacing:.5px; }
  .dd-section ul { margin:4px 0; padding-left:18px; }
  .dd-section li { font-size:12px; color:var(--fg); margin:3px 0; line-height:1.4; }
  .dd-back { color:var(--acc); cursor:pointer; font-size:13px; margin:0 0 12px; }
  .dd-back:hover { text-decoration:underline; }
  .comp-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:8px; }
  .comp-item { background:var(--bg); border:1px solid var(--br); border-radius:6px; padding:10px; }
  .comp-key { color:var(--purple); font-size:11px; text-transform:uppercase; letter-spacing:.3px; }
  .comp-val { font-size:12px; margin-top:4px; }

  /* Search */
  .search-box { position:relative; }
  .search-box input { min-width:220px; padding-right:30px; }
  .search-results { position:absolute; top:100%; left:0; right:0; background:var(--card);
                    border:1px solid var(--br); border-radius:0 0 8px 8px; max-height:300px;
                    overflow-y:auto; z-index:10; display:none; }
  .search-results.open { display:block; }
  .search-hit { padding:8px 12px; font-size:12px; cursor:pointer; border-bottom:1px solid var(--br); }
  .search-hit:hover { background:var(--bg); color:var(--acc); }
  .search-hit .sh-name { color:var(--acc); }
  .search-hit .sh-claim { color:var(--mut); font-size:11px; }

  /* Framework detail modal */
  .modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.7);
                   z-index:100; display:flex; align-items:center; justify-content:center; }
  .modal { background:var(--card); border:1px solid var(--br); border-radius:12px;
           padding:24px; max-width:700px; width:90%; max-height:85vh; overflow-y:auto; }
  .modal-close { float:right; cursor:pointer; color:var(--mut); font-size:18px; }
  .modal-close:hover { color:var(--fg); }
  .related-list { margin:12px 0; }
  .related-item { padding:6px 0; border-bottom:1px solid var(--br); font-size:12px; cursor:pointer; }
  .related-item:hover { color:var(--acc); }
  .related-shared { color:var(--purple); font-size:10px; text-transform:uppercase; }

  /* Viability badges */
  .badge { display:inline-block; padding:2px 6px; border-radius:4px; font-size:10px;
           font-weight:bold; text-transform:uppercase; }
  .badge-promising { background:#1a3a1a; color:var(--acc); }
  .badge-speculative { background:#3a2a1a; color:var(--warn); }
  .badge-incoherent { background:#3a1a1a; color:var(--bad); }
</style>
</head>
<body>
<header>
  <h1>Theory <span>Forge</span></h1>
  <span class="version">v0.5</span>
  <span id="header-stats" class="version"></span>
  <p class="sub">Collide a mechanism from one field into the domain of another. Surface only what hasn't been tried.</p>
</header>

<main>
  <div class="tabs">
    <div class="tab active" data-tab="forge">forge</div>
    <div class="tab" data-tab="batch">batch forge</div>
    <div class="tab" data-tab="rankings">rankings</div>
    <div class="tab" data-tab="deep-dives">deep dives</div>
    <div class="tab" data-tab="theories">theories</div>
    <div class="tab" data-tab="stats">stats</div>
    <div class="tab" data-tab="network">network</div>
    <div class="tab" data-tab="history">history</div>
  </div>

  <!-- FORGE TAB -->
  <div class="tab-content active" id="tab-forge">
    <div class="row">
      <input id="da" list="domains" placeholder="domain A (e.g. mycology)">
      <input id="db" list="domains" placeholder="domain B (e.g. economics)">
      <datalist id="domains"></datalist>
      <button id="go">collide domains</button>
      <button id="surprise">surprise me</button>
      <button id="explore-gap" title="Collide an unexplored domain pair">explore gap</button>
      <label class="toggle"><input type="checkbox" id="novel" checked> novel only</label>
      <div class="search-box">
        <input id="search-input" class="sm" placeholder="search frameworks..." style="min-width:200px">
        <div id="search-results" class="search-results"></div>
      </div>
    </div>
    <div id="result"></div>
    <div id="spotlight" style="margin-top:20px"></div>
    <h3 style="margin-top:32px; color:var(--mut); font-size:13px;">top candidate cross-domain pairs</h3>
    <div id="pairs"></div>
  </div>

  <!-- BATCH FORGE TAB -->
  <div class="tab-content" id="tab-batch">
    <div class="row">
      <label class="toggle">count:</label>
      <select id="batch-count" class="sm">
        <option>3</option><option selected>5</option><option>8</option><option>10</option>
      </select>
      <input id="batch-filter" class="sm" placeholder="domain filter (optional)">
      <button id="batch-go">batch forge</button>
    </div>
    <div id="batch-result"></div>
  </div>

  <!-- RANKINGS TAB -->
  <div class="tab-content" id="tab-rankings">
    <div class="row">
      <label class="toggle">min confidence:</label>
      <select id="rank-min" class="sm">
        <option value="0">all</option><option value="0.6">0.6+</option>
        <option value="0.7">0.7+</option><option value="0.8" selected>0.8+</option>
      </select>
      <input id="rank-domain" class="sm" placeholder="domain filter">
      <button id="rank-go">load rankings</button>
    </div>
    <div id="rank-result"></div>
  </div>

  <!-- DEEP DIVES TAB -->
  <div class="tab-content" id="tab-deep-dives">
    <div id="dd-list"></div>
    <div id="dd-detail" style="display:none"></div>
  </div>

  <!-- THEORIES TAB -->
  <div class="tab-content" id="tab-theories">
    <div class="row">
      <input id="theory-domain" class="sm" list="domains" placeholder="filter by domain">
      <button id="theory-go">browse</button>
      <span id="theory-count" class="meta"></span>
    </div>
    <div id="theory-result"></div>
  </div>

  <!-- STATS TAB -->
  <div class="tab-content" id="tab-stats">
    <div id="stats-result"></div>
  </div>

  <!-- NETWORK TAB -->
  <div class="tab-content" id="tab-network">
    <div class="row">
      <button id="net-load">load domain network</button>
      <span id="net-stats" class="meta"></span>
    </div>
    <canvas id="net-canvas" width="1000" height="600" style="background:var(--bg);border:1px solid var(--br);border-radius:8px;width:100%;cursor:grab"></canvas>
  </div>

  <!-- HISTORY TAB -->
  <div class="tab-content" id="tab-history">
    <div id="history-result"></div>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
const fmt = (o) => JSON.stringify(o, null, 2);
const esc = (s) => s.replace(/</g,'&lt;').replace(/>/g,'&gt;');

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    $('tab-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'history') loadHistory();
    if (tab.dataset.tab === 'rankings') loadRankings();
    if (tab.dataset.tab === 'deep-dives') loadDeepDives();
    if (tab.dataset.tab === 'theories') loadTheories();
    if (tab.dataset.tab === 'stats') loadStats();
    if (tab.dataset.tab === 'network') loadNetwork();
  };
});

async function loadDomains() {
  const r = await fetch('/domains');
  const ds = await r.json();
  $('domains').innerHTML = ds.map(d => `<option value="${d}">`).join('');
}

async function loadPairs() {
  const novel = $('novel').checked ? 'true' : 'false';
  const r = await fetch(`/pairs?limit=15&novel_only=${novel}`);
  const rows = await r.json();
  $('pairs').innerHTML = rows.map(p => `
    <div class="pair" data-a="${p.a}" data-b="${p.b}">
      <span>${esc(p.a_name)} <span class="sim">(${esc(p.a_domain)})</span>
        &times; ${esc(p.b_name)} <span class="sim">(${esc(p.b_domain)})</span></span>
      <span class="sim">sim ${p.similarity}</span>
    </div>
  `).join('') || `<div class="card meta">no pairs match current filters.</div>`;
  document.querySelectorAll('.pair').forEach(el =>
    el.onclick = () => collideIds(el.dataset.a, el.dataset.b));
}

function viabilityBadge(v) {
  const cls = v === 'promising' ? 'badge-promising' : v === 'speculative' ? 'badge-speculative' : 'badge-incoherent';
  return `<span class="badge ${cls}">${esc(v||'?')}</span>`;
}

function render(data, target) {
  target = target || 'result';
  if (data.error) { $(target).innerHTML = `<div class="card err">${esc(String(data.error))}</div>`; return; }
  const { a, b, framework, similarity, prior } = data;
  const priorBlock = prior
    ? `<div class="prior">&#9888; prior collision on record: <b>${esc(prior.label)}</b>
       [${esc(prior.status)}] &mdash; ${esc(prior.note)}</div>` : '';
  $(target).innerHTML += `
    <div class="card">
      <p class="name">${esc(framework.name || '(unnamed framework)')} ${viabilityBadge(framework.viability)}</p>
      <p class="meta">${esc(a.name)} (${esc(a.domain)}) &times; ${esc(b.name)} (${esc(b.domain)})
        ${similarity !== undefined ? '&middot; structural sim ' + similarity : ''}
        &middot; confidence <strong>${(framework.confidence||0).toFixed(2)}</strong></p>
      ${priorBlock}
      <pre>${esc(fmt(framework))}</pre>
    </div>`;
}

async function post(url, body) {
  const btns = document.querySelectorAll('button');
  btns.forEach(b => b.disabled = true);
  $('result').innerHTML = `<div class="card meta">forging&hellip;</div>`;
  try {
    const r = await fetch(url, { method:'POST',
      headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const data = await r.json();
    if (!r.ok) { render({ error: data.detail || 'error' }); return; }
    render(data);
  } catch (e) { render({ error: String(e) }); }
  finally { btns.forEach(b => b.disabled = false); }
}

$('go').onclick = () => post('/collide_domains', {
  domain_a: $('da').value.trim(),
  domain_b: $('db').value.trim(),
  novel_only: $('novel').checked,
});

function collideIds(a_id, b_id) { post('/collide', { a_id, b_id }); }

$('surprise').onclick = async () => {
  const novel = $('novel').checked ? 'true' : 'false';
  const r = await fetch(`/pairs?limit=30&novel_only=${novel}`);
  const rows = await r.json();
  if (!rows.length) return;
  const pick = rows[Math.floor(Math.random() * rows.length)];
  collideIds(pick.a, pick.b);
};

$('novel').onchange = loadPairs;

$('explore-gap').onclick = async () => {
  const r = await fetch('/gaps?limit=30');
  const gaps = await r.json();
  if (!gaps.length) { render({error:'no unexplored gaps found'}); return; }
  const pick = gaps[Math.floor(Math.random() * Math.min(gaps.length, 15))];
  $('da').value = pick.domain_a;
  $('db').value = pick.domain_b;
  post('/collide_domains', { domain_a: pick.domain_a, domain_b: pick.domain_b, novel_only: true });
};

// Search
let searchTimeout;
$('search-input').oninput = () => {
  clearTimeout(searchTimeout);
  const q = $('search-input').value.trim();
  if (q.length < 2) { $('search-results').classList.remove('open'); return; }
  searchTimeout = setTimeout(async () => {
    const r = await fetch(`/search?q=${encodeURIComponent(q)}&limit=10`);
    const hits = await r.json();
    if (!hits.length) { $('search-results').innerHTML = '<div class="search-hit"><span class="sh-claim">no results</span></div>'; }
    else {
      $('search-results').innerHTML = hits.map(fw => `
        <div class="search-hit" data-name="${esc(fw.name||'')}">
          <div class="sh-name">${esc(fw.name||'?')} <span class="conf">${(fw.confidence||0).toFixed(2)}</span></div>
          <div class="sh-claim">${esc((fw.core_claim||'').substring(0,120))}${(fw.core_claim||'').length>120?'...':''}</div>
        </div>`).join('');
    }
    $('search-results').classList.add('open');
    document.querySelectorAll('.search-hit').forEach(el => {
      el.onclick = () => {
        $('search-results').classList.remove('open');
        $('search-input').value = '';
        showFramework(el.dataset.name);
      };
    });
  }, 300);
};
$('search-input').onblur = () => setTimeout(() => $('search-results').classList.remove('open'), 200);

// Batch forge
$('batch-go').onclick = async () => {
  const btns = document.querySelectorAll('button');
  btns.forEach(b => b.disabled = true);
  $('batch-result').innerHTML = `<div class="card meta">batch forging&hellip; this may take a minute.</div>`;
  try {
    const body = {
      count: parseInt($('batch-count').value),
      domain_filter: $('batch-filter').value.trim() || null,
    };
    const r = await fetch('/batch_collide', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body),
    });
    const data = await r.json();
    if (!r.ok) { $('batch-result').innerHTML = `<div class="card err">${esc(data.detail || 'error')}</div>`; return; }
    $('batch-result').innerHTML = `<div class="meta" style="margin:8px 0">${data.count} frameworks forged</div>`;
    data.results.forEach(item => {
      if (item.error) {
        $('batch-result').innerHTML += `<div class="card err">${esc(item.a)} &times; ${esc(item.b)}: ${esc(item.error)}</div>`;
      } else {
        render(item, 'batch-result');
      }
    });
  } catch (e) { $('batch-result').innerHTML = `<div class="card err">${esc(String(e))}</div>`; }
  finally { btns.forEach(b => b.disabled = false); }
};

// Rankings
let rankOffset = 0;
const RANK_PAGE = 50;
async function loadRankings(append) {
  if (!append) { rankOffset = 0; $('rank-result').innerHTML = ''; }
  const min = $('rank-min').value;
  const domain = $('rank-domain').value.trim();
  let url = `/rankings?limit=${RANK_PAGE}&offset=${rankOffset}&min_confidence=${min}`;
  if (domain) url += `&domain=${encodeURIComponent(domain)}`;
  const r = await fetch(url);
  const data = await r.json();
  if (!data.length && !append) { $('rank-result').innerHTML = '<div class="card meta">no frameworks match filters.</div>'; return; }
  const existing = $('rank-result').querySelector('.rank-more');
  if (existing) existing.remove();
  $('rank-result').innerHTML += data.map((fw, i) => `
    <div class="rank-item">
      <span class="conf">${(fw.confidence || 0).toFixed(2)}</span>
      ${viabilityBadge(fw.viability)}
      <strong class="name-link" onclick="showFramework('${esc((fw.name||'').replace(/'/g,"\\'"))}')" style="cursor:pointer">${esc(fw.name || '?')}</strong>
      <span class="sim" onclick="toggleExpand(this.parentElement)" style="cursor:pointer">&mdash; ${esc(fw._batch || '')} &#9660;</span>
      <div class="claim">${esc((fw.core_claim || '').substring(0, 200))}${(fw.core_claim||'').length > 200 ? '&hellip;' : ''}</div>
      <div class="rank-expand" style="display:none;margin-top:8px">
        <pre style="font-size:11px">${esc(fmt(fw))}</pre>
      </div>
    </div>
  `).join('');
  rankOffset += data.length;
  if (data.length === RANK_PAGE) {
    $('rank-result').innerHTML += '<button class="rank-more" onclick="loadRankings(true)" style="margin:12px 0;width:100%">load more</button>';
  }
}
$('rank-go').onclick = () => loadRankings(false);

// Deep Dives
async function loadDeepDives() {
  $('dd-detail').style.display = 'none';
  $('dd-list').style.display = 'block';
  const r = await fetch('/deep-dives');
  const dives = await r.json();
  if (!dives.length) { $('dd-list').innerHTML = '<div class="card meta">no deep dives yet.</div>'; return; }
  $('dd-list').innerHTML = dives.map(dd => `
    <div class="dd-card" data-slug="${esc(dd.slug)}">
      <div class="dd-title">#${dd.rank} ${esc(dd.name)}</div>
      <div class="dd-meta">confidence ${(dd.confidence||0).toFixed(2)} &middot;
        ${dd.predictions_count} predictions &middot; ${dd.experiments_count} experiments</div>
      <div class="dd-summary">${esc((dd.executive_summary||'').substring(0, 250))}${(dd.executive_summary||'').length>250?'...':''}</div>
    </div>
  `).join('');
  document.querySelectorAll('.dd-card').forEach(el => {
    el.onclick = () => loadDeepDive(el.dataset.slug);
  });
}

async function loadDeepDive(slug) {
  $('dd-list').style.display = 'none';
  $('dd-detail').style.display = 'block';
  $('dd-detail').innerHTML = '<div class="card meta">loading&hellip;</div>';
  const r = await fetch(`/deep-dives/${slug}`);
  const dd = await r.json();
  const mc = dd.mapped_components || {};
  $('dd-detail').innerHTML = `
    <div class="dd-back" onclick="loadDeepDives()">&larr; back to all deep dives</div>
    <h2 style="color:var(--acc);margin:0 0 4px">${esc(dd.name||'?')}</h2>
    <div class="dd-meta">Rank #${dd.rank||'?'} &middot; Confidence ${(dd.confidence||0).toFixed(2)}</div>
    <div class="dd-section">
      <h4>Executive Summary</h4>
      <p style="font-size:13px;line-height:1.6">${esc(dd.executive_summary||'')}</p>
    </div>
    <div class="dd-section">
      <h4>Mapped Components</h4>
      <div class="comp-grid">
        ${['unit','variation','selection','fitness','boundary'].map(k => `
          <div class="comp-item">
            <div class="comp-key">${k}</div>
            <div class="comp-val">${esc(mc[k]||'—')}</div>
          </div>

// Theories browser
async function loadTheories() {
  const domain = $('theory-domain').value.trim();
  let url = '/theories';
  if (domain) url += `?domain=${encodeURIComponent(domain)}`;
  const r = await fetch(url);
  const data = await r.json();
  $('theory-count').textContent = `${data.length} theories`;
  if (!data.length) { $('theory-result').innerHTML = '<div class="card meta">no theories found.</div>'; return; }

  data.forEach(t => { (grouped[t.domain] = grouped[t.domain] || []).push(t); });

      </div>
      <div class="batch-items">
        ${theories.map(t => `
          <div class="card" style="margin:6px 0;padding:10px 12px">
            <div class="name" style="font-size:14px">${esc(t.name)}</div>
            <div class="meta">${esc(t.id)}</div>
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:6px;margin-top:8px">
              ${['unit','variation','selection','fitness','boundary'].map(k => `

// Framework detail modal
async function showFramework(name) {
  try {
    const r = await fetch(`/framework/${encodeURIComponent(name)}`);
    if (!r.ok) return;
    const fw = await r.json();
    const related = fw.related_frameworks || [];
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    overlay.innerHTML = `
      <div class="modal">
        <span class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</span>
        <h2 style="color:var(--acc);margin:0 0 8px;font-size:18px">${esc(fw.name||'?')} ${viabilityBadge(fw.viability)}</h2>
        <div class="meta">confidence <strong>${(fw.confidence||0).toFixed(2)}</strong>
          &middot; ${esc(fw.mechanism_borrowed_from||fw.mechanism_source||'')} &rarr; ${esc(fw.domain_applied_to||fw.target_domain||'')}
          &middot; ${esc(fw._batch||'')}</div>
        <p style="font-size:13px;margin:12px 0;line-height:1.6">${esc(fw.core_claim||fw.application||'')}</p>
        ${fw.prediction ? `<div style="font-size:12px;margin:8px 0"><strong style="color:var(--blue)">Prediction:</strong> ${esc(fw.prediction)}</div>` : ''}
        ${related.length ? `
          <h3 style="color:var(--mut);font-size:13px;margin:16px 0 8px">related frameworks</h3>
          <div class="related-list">
            ${related.map(r => `
              <div class="related-item" onclick="this.closest('.modal-overlay').remove();showFramework('${esc(r.name.replace(/'/g,"\\'"))}')">
                <span class="conf">${(r.confidence||0).toFixed(2)}</span>
                <span style="color:var(--acc)">${esc(r.name)}</span>
                <span class="related-shared">${esc(r.shared)}</span>
              </div>
            `).join('')}
          </div>
        ` : ''}
        <details style="margin-top:12px">
          <summary style="cursor:pointer;color:var(--mut);font-size:12px">raw JSON</summary>

    document.body.appendChild(overlay);
  } catch(e) { console.error(e); }

// Network visualization
$('net-load').onclick = loadNetwork;
async function loadNetwork() {
  $('net-load').disabled = true;
  $('net-stats').textContent = 'loading...';
  const r = await fetch('/domain-network');
  const data = await r.json();
  $('net-stats').textContent = `${data.node_count} domains, ${data.edge_count} connections`;
  $('net-load').disabled = false;
  drawNetwork(data);
}

function drawNetwork(data) {
  const canvas = $('net-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const nodes = data.nodes.map((name, i) => {
    const angle = (i / data.nodes.length) * Math.PI * 2;
    const r = Math.min(W, H) * 0.35;
    return { name, x: W/2 + Math.cos(angle) * r + (Math.random()-0.5)*60,
                   y: H/2 + Math.sin(angle) * r + (Math.random()-0.5)*60,
                   vx: 0, vy: 0 };
  });
  const nodeMap = {};
  nodes.forEach((n, i) => nodeMap[n.name] = i);
  const edges = data.edges.map(e => ({
    s: nodeMap[e.source], t: nodeMap[e.target], w: e.weight
  })).filter(e => e.s !== undefined && e.t !== undefined);
  const maxW = Math.max(...edges.map(e => e.w), 1);
  const connCount = {};
  edges.forEach(e => {
    connCount[e.s] = (connCount[e.s]||0) + e.w;
    connCount[e.t] = (connCount[e.t]||0) + e.w;
  });

  function tick() {
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i+1; j < nodes.length; j++) {
        let dx = nodes[j].x - nodes[i].x, dy = nodes[j].y - nodes[i].y;
        let d = Math.sqrt(dx*dx + dy*dy) || 1;
        let f = 800 / (d * d);
        nodes[i].vx -= dx/d * f; nodes[i].vy -= dy/d * f;
        nodes[j].vx += dx/d * f; nodes[j].vy += dy/d * f;
      }
    }
    edges.forEach(e => {
      let dx = nodes[e.t].x - nodes[e.s].x, dy = nodes[e.t].y - nodes[e.s].y;
      let d = Math.sqrt(dx*dx + dy*dy) || 1;
      let f = (d - 120) * 0.005 * e.w;
      nodes[e.s].vx += dx/d * f; nodes[e.s].vy += dy/d * f;
      nodes[e.t].vx -= dx/d * f; nodes[e.t].vy -= dy/d * f;
    });
    nodes.forEach(n => {
      n.vx += (W/2 - n.x) * 0.001;
      n.vy += (H/2 - n.y) * 0.001;
      n.vx *= 0.9; n.vy *= 0.9;
      n.x += n.vx; n.y += n.vy;
      n.x = Math.max(30, Math.min(W-30, n.x));
      n.y = Math.max(20, Math.min(H-20, n.y));
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    edges.forEach(e => {
      ctx.beginPath();
      ctx.moveTo(nodes[e.s].x, nodes[e.s].y);
      ctx.lineTo(nodes[e.t].x, nodes[e.t].y);
      ctx.strokeStyle = `rgba(126,231,135,${0.08 + 0.3 * e.w/maxW})`;
      ctx.lineWidth = 0.5 + 2 * e.w/maxW;
      ctx.stroke();
    });
    nodes.forEach(n => {
      const c = connCount[nodeMap[n.name]] || 1;
      const r = 3 + Math.min(c/4, 8);
      ctx.beginPath();
      ctx.arc(n.x, n.y, r, 0, Math.PI*2);
      ctx.fillStyle = c > 5 ? '#7ee787' : c > 2 ? '#79c0ff' : '#8b949e';
      ctx.fill();
      ctx.font = '9px monospace';
      ctx.fillStyle = '#e6edf3';
      ctx.textAlign = 'center';
      if (nodes.length < 80 || c > 3) {
        ctx.fillText(n.name, n.x, n.y - r - 3);
      }
    });
  }

  let frame = 0;
  function animate() {
    tick();
    draw();
    frame++;
    if (frame < 300) requestAnimationFrame(animate);
  }
  animate();

  let dragNode = null;
  canvas.onmousedown = (ev) => {
    const rect = canvas.getBoundingClientRect();
    const sx = W / rect.width, sy = H / rect.height;
    const mx = (ev.clientX - rect.left) * sx, my = (ev.clientY - rect.top) * sy;
    dragNode = nodes.find(n => Math.hypot(n.x-mx, n.y-my) < 15) || null;
    if (dragNode) canvas.style.cursor = 'grabbing';
  };
  canvas.onmousemove = (ev) => {
    if (!dragNode) return;
    const rect = canvas.getBoundingClientRect();
    const sx = W / rect.width, sy = H / rect.height;
    dragNode.x = (ev.clientX - rect.left) * sx;
    dragNode.y = (ev.clientY - rect.top) * sy;
    dragNode.vx = 0; dragNode.vy = 0;
    draw();
  };
  canvas.onmouseup = () => { dragNode = null; canvas.style.cursor = 'grab'; };
}
